# _data/research.yml (research.html)
# Structure for your current research projects

- title: "Mechanisms of transcription initiation"
  # status: "completed"
  # timeline: "2022"
  description: >-
    Transcription start site (TSS) selection has downstream regulatory
    consequences on the expression of a gene. I am interested in using
    data across different kinds of sequencing assays to investigate the
    kinetics around TSS selection and how a cell can drive initiation
    at certain TSSs over others.
  techniques:
    - "Genome Regulation"
    - "Transcription initiation"
    - "ChIP-exo"
    - "RNA-seq"
    - "PRO-cap"
  image: "assets/img/TranscriptionInitiation_2022Mittal.jpg"

- title: "ScriptManager"
  # status: "active"
  timeline: "2019-present"
  description: >-
    ScriptManager is a generalized collection of scripts for analyzing 
    genomic datasets (perfect for non-bioinformaticians) for a broad
    variety of biochemical sequencing assays.
  techniques:
    - "Tool development"
    - "NGS sequencing"
    - "Data analysis"
    - "Build workflows"
    - "Reproducibility"
  output_url: "https://pughlab.mbg.cornell.edu/scriptmanager-docs"
  output_type: "Software & Documentation"
  # image: "assets/img/SM_icon.svg"
  image: "assets/img/scriptmanager.png"

- title: "GenoPipe"
  # status: "active"
  timeline: "2020-2023"
  description: >-
    GenoPipe is a quality control tool for analyzing NGS datasets for
    three different types of genetic backgrounds for a quick
    post-sequencing check that the strain background of the sample
    matches the expectation.
  techniques:
    - "Tool development"
    - "Quality control"
    - "NGS sequencing"
    - "Reproducibility"
  output_url: "https://genopipe.org"
  output_type: "Software & Documentation"
  # image: "assets/img/Genopipe_icon.svg"
  image: "assets/img/genopipe.jpg"

