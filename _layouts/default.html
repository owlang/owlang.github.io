<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/subpage.css' | relative_url }}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css" />
</head>
<body>
    <nav class="main-nav">
        <div class="nav-content">
            <a href="{{ '/' | relative_url }}" class="nav-logo">{{ site.title }}</a>
            <ul class="nav-links">
                {% for item in site.data.navigation %}
                    <li><a href="/{{ item.link }}/">{{ item.name }}</a></li>
                {% endfor %}
            </ul>
        </div>
    </nav>

    <main>
        {{ content }}
    </main>

    <footer class="main-footer">
        <p>&copy; 2024 {{ site.title }}. Built with coffee, curiosity, and a whole lot of sequencing data.</p>
    </footer>
</body>
</html>
