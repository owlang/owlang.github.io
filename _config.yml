# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: OWLANG
description: Where genomics analysis meets approachable science
url: "https://owlang.github.io/" # Change this to your actual domain
baseurl: "" # Leave empty if hosting at root, or "/subdirectory" if not

# Author info
author:
  name: Olivia Lang
  email: your.email@example.com
  github: "owlang"
  orcid: "0000-0002-5886-363X"
  ncbi-href: "https://www.ncbi.nlm.nih.gov/myncbi/1nQUhycu9bQ1ec/bibliography/public"

# Build settings
markdown: kramdown
theme: minima # You can remove this if using custom layout

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude files from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md

# Collections (if you want to organize guides and resources as collections)
collections:
  guides:
    output: true
    permalink: /guides/:path/
  resources:
    output: true
    permalink: /resources/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: "guides"
    values:
      layout: "guide"
  - scope:
      path: ""
      type: "resources"
    values:
      layout: "resource"

# SEO
twitter:
  username: your_twitter
  card: summary

# Analytics (optional)
# google_analytics: UA-XXXXXXXX-X
