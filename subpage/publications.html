---
layout: default
title: "Publications"
---

<div class="publication-block" >
  <ul style="list-style-type:none;">
    
    {% for item in site.data.publications %}

    <li>
      <p class="publication-item publication-hang">
        <!-- APA-ish style -->
        {{ item.authors }}
        ({{item.year}})
        {{item.title}}
        {{item.journal}}
        <a href="{{ item.href }}">
            {{ item.doi }}
            <!-- <i class="bi bi-box-arrow-up-right"></i> -->
        </a>
        &nbsp;
        <a href="https://pubmed.ncbi.nlm.nih.gov/{{ item.PMID }}">
            <img src="/assets/img/NCBI.svg" style="height: 20px"/>
        </a>
      </p>
    </li>

    {% endfor %}

  </ul>
</div>
