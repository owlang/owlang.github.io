---
layout: default
title: "Publications"
---

{% for year in site.data.publications %}

<div class="publication-block" >
    <div class="publication-year">{{ year[0] }}</div>
    <div class="publication-list">

    {% for item in year[1] %}

    <p class="publication-item">
        <span class="publication-title">
                {{ item.title }}
        </span>
        <br>{{ item.authors }}
        <br>{{ item.journal }}
        <a href="{{ item.href }}">
            {{ item.doi }}
            <i class="bi bi-box-arrow-up-right"></i>
        </a>
    </p>

    {% endfor %}

    </div>
</div>

{% endfor %}
